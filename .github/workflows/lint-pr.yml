name: Lint PR

# PR-specific lint workflow with hard-gate semantics. Mirrors the
# pre-commit hook (hooks/pre-commit.hook) so anything that lands on
# main is byte-identical to the gst-indent output.
#
# Sequenced so the cheap formatter check fails fast before the slower
# clang-tidy pass spins up:
#   gst-indent  -> hard gate (formatting must match tools/gst-indent)
#   clang-tidy  -> hard gate (no warnings/errors on libksuid sources)
#
# This workflow is imported by ci-pr.yml as Phase 1.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Phase 1a: gst-indent code-style check (fast, ~seconds)
  # Runs the same formatter the pre-commit hook does, then asserts the
  # working tree is unchanged. Any deviation blocks the PR.
  # ==========================================================================
  gst-indent-check:
    name: gst-indent code style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install GNU indent
        run: |
          sudo apt-get update
          sudo apt-get install -y indent
          # GNU indent's --version exits 64 ("usage error") on every
          # build I have tested -- including the apt package on noble.
          # Tolerate the bogus exit code so the step still records the
          # version banner without taking down bash -e.
          indent --version || true

      - name: Run gst-indent (hard gate)
        run: |
          set -o pipefail
          # Format every C source/header in-place using the same
          # wrapper the pre-commit hook validates against.
          find libksuid examples tests \
            \( -name '*.c' -o -name '*.h' \) -print0 \
            | xargs -0 -r ./tools/gst-indent
          # GNU indent leaves ~ backup files; clean them up so the
          # diff check below only sees real reformatting deltas.
          find libksuid examples tests -name '*~' -delete
          if ! git diff --exit-code; then
            echo "::error::gst-indent introduced changes. Run \
              ./tools/gst-indent on the affected files locally and \
              commit the result."
            exit 1
          fi

      - name: Publish results
        if: always()
        run: |
          echo '## gst-indent Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if git diff --quiet; then
            echo 'No formatting issues found.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '**Formatting violations found — PR blocked**' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            git diff | head -200 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ==========================================================================
  # Phase 1b: clang-tidy 22 (slow, up to 30 min)
  # Runs only after gst-indent passes. Any warning/error fails the PR.
  # ==========================================================================
  clang-tidy-check:
    name: clang-tidy 22
    needs: [gst-indent-check]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install LLVM 22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y clang-tidy-22 clang-tools-22 \
            meson ninja-build

      - name: Verify tool versions
        run: |
          clang-tidy-22 --version
          meson --version

      - name: Configure build (for compile_commands.json)
        run: meson setup builddir

      - name: Run clang-tidy (hard gate)
        run: |
          set -o pipefail
          run-clang-tidy-22 -p builddir \
            "^.*/libksuid/.*\.(c|h)$" \
            2>&1 | tee tidy-results.txt
          if grep -qE '^.*\.(c|h):[0-9]+:[0-9]+: (warning|error):' tidy-results.txt; then
            echo "::error::clang-tidy reported issues."
            exit 1
          fi

      - name: Publish results
        if: always()
        run: |
          echo '## clang-tidy Results' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -s tidy-results.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 tidy-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No issues found.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload tidy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tidy-results-pr
          path: tidy-results.txt
