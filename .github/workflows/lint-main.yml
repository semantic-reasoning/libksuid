name: Lint Main

# Non-blocking lint monitoring for main-branch pushes.
#
# Same checks as lint-pr.yml but runs both jobs in parallel and uses
# continue-on-error: true so findings surface in the step summary
# without ever blocking a merge that has already landed. ci-main.yml
# imports this workflow as Phase 1.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # ==========================================================================
  # Check 1: gst-indent (fast)
  # Non-blocking: deviations from tools/gst-indent surface in the summary.
  # ==========================================================================
  gst-indent-check:
    name: gst-indent code style (monitor)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Install GNU indent
        run: |
          sudo apt-get update
          sudo apt-get install -y indent
          # GNU indent's --version exits 64 ("usage error") on every
          # build I have tested -- including the apt package on noble.
          # Tolerate the bogus exit code so the step still records the
          # version banner without taking down bash -e.
          indent --version || true

      - name: Run gst-indent
        run: |
          find libksuid examples tests \
            \( -name '*.c' -o -name '*.h' \) -print0 \
            | xargs -0 -r ./tools/gst-indent
          find libksuid examples tests -name '*~' -delete
          git diff > format-results.txt || true

      - name: Publish results
        if: always()
        run: |
          echo '## gst-indent Results (main monitor)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -s format-results.txt ]; then
            count=$(wc -l < format-results.txt | tr -d ' ')
            echo "**${count} diff line(s) — non-blocking**" >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            head -200 format-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No formatting issues found.' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ==========================================================================
  # Check 2: clang-tidy 22 (slow, up to 30 min)
  # Non-blocking: findings reported as artifacts + summary.
  # ==========================================================================
  clang-tidy-check:
    name: clang-tidy 22 (monitor)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install LLVM 22 + meson
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb https://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y clang-tidy-22 clang-tools-22 \
            meson ninja-build

      - name: Configure build (for compile_commands.json)
        run: meson setup builddir

      - name: Run clang-tidy
        run: |
          run-clang-tidy-22 -p builddir \
            "^.*/libksuid/.*\.(c|h)$" \
            2>&1 | tee tidy-results.txt || true

      - name: Publish results
        if: always()
        run: |
          echo '## clang-tidy Results (main monitor)' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          if [ -s tidy-results.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 tidy-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'No issues found.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload tidy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tidy-results-main
          path: tidy-results.txt
